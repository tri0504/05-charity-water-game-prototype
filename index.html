<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>charity: water Memory Match</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container py-2 py-md-4">
        <header class="text-center mb-3">
            <h1 class="game-title mb-2">charity: water Memory Match</h1>
            <p class="lead mb-0">Match clean water solutions and learn how each one helps communities.</p>
        </header>

        <section class="row g-2 justify-content-center mb-3">
            <div class="col-6 col-md-3">
                <div class="info-card">
                    <h2 class="info-label">Time</h2>
                    <p id="timer" class="info-value mb-0">00:00</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="info-card">
                    <h2 class="info-label">Score</h2>
                    <p id="score" class="info-value mb-0">0</p>
                </div>
            </div>
        </section>

        <section class="row justify-content-center mb-3">
            <div class="col-12 col-md-10 col-lg-8">
                <div id="game-board" class="game-board" aria-label="Memory game board"></div>
            </div>
        </section>

        <section class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div id="snippet-panel" class="snippet-panel" aria-live="polite">
                    Match a pair to reveal a clean water solution fact.
                </div>
            </div>
        </section>
    </main>

    <div class="modal fade" id="winModal" tabindex="-1" aria-labelledby="winModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title fs-5" id="winModalLabel">You solved every match!</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-2">Final Score: <strong id="final-score">0</strong></p>
                    <p class="mb-3">Final Time: <strong id="final-time">00:00</strong></p>
                    <a
                        href="https://www.charitywater.org/our-work"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="btn btn-outline-primary w-100"
                    >
                        Learn More about charity: water
                    </a>
                </div>
                <div class="modal-footer">
                    <button type="button" id="play-again" class="btn btn-warning">Play Again</button>
                </div>
            </div>
        </div>
    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
</body>
</html>
